<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/style.css}" />
	<title>レース修正</title>
</head>

<body>
	<header class="site-header">
		<div class="site-title">
			<img th:src="@{/images/horseLogo.png}" alt="Steel Horse Run ロゴ" class="site-logo">
			<span>Steel Horse Run</span>
		</div>

		<nav class="site-nav">
			<a th:href="@{/races}">レース一覧</a>
			<a th:href="@{/races/new}">レース登録</a>
		</nav>
	</header>

	<div class="container">

		<h1>レース修正</h1>

		<p th:if="${errorMessage}"
		   th:text="${errorMessage}"
		   class="error-message">
		</p>

		<form th:action="@{/races/{raceId}/edit(raceId=${raceForm.raceId})}"
		      th:object="${raceForm}"
		      method="post">

			<input type="hidden" th:field="*{raceId}">

			<p>
				開催日：
				<span class="required-label">必須</span>
				<input type="date" th:field="*{raceDate}" required>
			</p>

			<p>
				場所：
				<span class="required-label">必須</span>
				<select th:field="*{place}" required>
					<option value="">選択してください</option>
					<option value="東京">東京</option>
					<option value="中山">中山</option>
					<option value="京都">京都</option>
					<option value="阪神">阪神</option>
					<option value="中京">中京</option>
					<option value="札幌">札幌</option>
					<option value="函館">函館</option>
					<option value="福島">福島</option>
					<option value="新潟">新潟</option>
					<option value="小倉">小倉</option>
				</select>
			</p>

			<p>
				レース名：
				<span class="required-label">必須</span>
				<input type="text" th:field="*{raceName}" required>
			</p>

			<p>
				距離：
				<span class="required-label">必須</span>
				<select th:field="*{distance}" required>
					<option value="">選択してください</option>
					<option value="800">800m</option>
					<option value="1000">1000m</option>
					<option value="1200">1200m</option>
					<option value="1400">1400m</option>
					<option value="1600">1600m</option>
					<option value="1800">1800m</option>
					<option value="2000">2000m</option>
					<option value="2200">2200m</option>
					<option value="2400">2400m</option>
					<option value="2500">2500m</option>
					<option value="3000">3000m</option>
					<option value="3200">3200m</option>
					<option value="3600">3600m</option>
				</select>
			</p>

			<p>
				馬場：
				<span class="required-label">必須</span>
				<select th:field="*{surface}" required>
					<option value="">選択してください</option>
					<option value="芝">芝</option>
					<option value="ダート">ダート</option>
					<option value="障害">障害</option>
				</select>
			</p>

			<p>
				天気：
				<span class="required-label">必須</span>
				<select th:field="*{weather}" required>
					<option value="">選択してください</option>
					<option value="晴れ">晴れ</option>
					<option value="曇り">曇り</option>
					<option value="雨">雨</option>
				</select>
			</p>

			<p>
				馬場状態：
				<span class="required-label">必須</span>
				<select th:field="*{trackCondition}" required>
					<option value="">選択してください</option>
					<option value="良">良</option>
					<option value="稍重">稍重</option>
					<option value="重">重</option>
					<option value="不良">不良</option>
				</select>
			</p>

			<button type="submit">修正する</button>

		</form>

		<br>

		<a th:href="@{/races}" class="btn btn-danger">
			レース一覧に戻る
		</a>

	</div>
</body>

</html>>
