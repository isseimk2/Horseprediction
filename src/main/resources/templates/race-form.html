<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<title>レース登録</title>
</head>

<body>
	<header class="site-header">
		<div class="site-title">Steel Horse Run</div>

		<nav class="site-nav">
			<a th:href="@{/races}">レース一覧</a>
			<a th:href="@{/races/new}">レース登録</a>
		</nav>
	</header>

	<div class="container">

		<h1>レース登録</h1>
		<p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message">
		</p>
		<form th:action="@{/races/new}" th:object="${raceForm}" method="post">

			<p>
				開催日：
				<input type="date" th:field="*{raceDate}">
			</p>

			<p>
				場所：
				<input type="text" th:field="*{place}">
			</p>

			<p>
				レース名：
				<input type="text" th:field="*{raceName}">
			</p>

			<p>
				距離：
				<input type="number" th:field="*{distance}">
			</p>

			<p>
				馬場：
				<select th:field="*{surface}">
					<option value="">選択してください</option>
					<option value="芝">芝</option>
					<option value="ダート">ダート</option>
					<option value="障害">障害</option>
				</select>
			</p>

			<p>
				天気：
				<select th:field="*{weather}">
					<option value="">選択してください</option>
					<option value="晴れ">晴</option>
					<option value="曇り">曇</option>
					<option value="雨">雨</option>
				</select>
			</p>

			<p>
				馬場状態：
				<select th:field="*{trackCondition}">
					<option value="">選択してください</option>
					<option value="良">良</option>
					<option value="稍重">稍重</option>
					<option value="重">重</option>
					<option value="不良">不良</option>
				</select>
			</p>

			<button type="submit">レースを登録する</button>

		</form>
		<br>
		<form th:action="@{/races}" method="get">
			<button type="submit" class="btn-sub">レース一覧に戻る</button>
		</form>
	</div>
</body>

</html>
