<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<title>実際の結果入力</title>
</head>

<body>
	<header class="site-header">
		<div class="site-title">
			<img th:src="@{/images/horseLogo.png}" alt="Steel Horse Run ロゴ" class="site-logo">
			<span>Steel Horse Run</span>
		</div>

		<nav class="site-nav">
			<a th:href="@{/races}">レース一覧</a>
			<a th:href="@{/races/new}">レース登録</a>
		</nav>
	</header>

	<div class="container">

		<h1>実際の結果入力</h1>

		<div class="race-info" th:if="${race != null}">
			<h2 th:text="${race.raceName}">レース名</h2>
			<p>
				開催日：
				<span th:text="${race.raceDate}"></span>
			</p>
			<p>
				場所：
				<span th:text="${race.place}"></span>
				／ 距離：
				<span th:text="${race.distance}"></span>m
				／ 馬場：
				<span th:text="${race.surface}"></span>
			</p>
		</div>

		<form th:action="@{/races/{raceId}/results/edit(raceId=${raceId})}" th:object="${raceResultForm}" method="post">

			<table>
				<tr>
					<th>馬番</th>
					<th>馬名</th>
					<th>騎手</th>
					<th>予想順位</th>
					<th>実際の順位</th>
				</tr>

				<tr th:each="entry, stat : *{entries}">
					<td th:text="${entry.horseNumber}"></td>
					<td th:text="${entry.horseName}"></td>
					<td th:text="${entry.jockey}"></td>
					<td th:text="${entry.predictionRank}"></td>
					<td>
						<input type="hidden" th:field="*{entries[__${stat.index}__].entryId}">

						<input type="number" min="1" th:field="*{entries[__${stat.index}__].resultRank}">
					</td>
				</tr>
			</table>

			<br>

			<button type="submit">結果を保存する</button>

		</form>

		<br>

		<a th:href="@{/races/{raceId}/entries(raceId=${raceId})}" class="btn">
			予想結果に戻る
		</a>

	</div>
</body>

</html>
